/* fill the weather hero: live Open-Meteo first, task hourly[] as fallback.
   The card background + text tone shift to match the sky; hovering the hourly chart
   re-skins the card and swaps the Feels/Rain/Humidity/Wind readouts to that hour. */
function setWxMeta(feels, rain, hum, wind){
  const meta = $("#wxMeta"); if(!meta) return;
  const cells = [];
  if(feels!=null && !isNaN(feels)) cells.push(["Feels", feels+"°"]);
  if(rain!=null) cells.push(["Rain", rain+"%"]);
  if(hum!=null) cells.push(["Humidity", hum+"%"]);
  if(wind!=null && !isNaN(wind)) cells.push(["Wind", wind+" mph"]);
  meta.innerHTML = cells.map(c => `<div class="m"><div class="mk">${esc(c[0])}</div><div class="mv">${esc(String(c[1]))}</div></div>`).join("");
}
async function loadTodayWeather(d){
  const hero = $("#wxHero"); if(!hero) return;
  const sky = $("#wxSky"), ov = $("#wxSkyOv");
  let skyTimer;
  /* crossfade between sky gradients (CSS can't transition gradients, so we fade an overlay) */
  const setSky = (grad, animate) => {
    if(!sky) return;
    if(!animate){ sky.style.background = grad; ov.style.transition = "none"; ov.style.opacity = "0"; return; }
    ov.style.transition = "opacity .35s ease";
    ov.style.background = grad;
    void ov.offsetWidth;
    ov.style.opacity = "1";
    clearTimeout(skyTimer);
    skyTimer = setTimeout(() => { sky.style.background = grad; ov.style.transition = "none"; ov.style.opacity = "0"; }, 360);
  };
  const applyTheme = (cond, day, animate) => {
    const th = wxTheme(cond, day);
    setSky(th.bg, animate);
    hero.style.color = th.text;
  };
  const paint = (wx) => {
    if(!$("#wxHero")) return;
    applyTheme(wx.curCond, wx.curDay, false);
    $("#wxGlyph").textContent = wxGlyph(wx.curCond);
    $("#wxTemp").textContent = (wx.curTemp==null||wx.curTemp==="—") ? "—" : wx.curTemp + "°";
    $("#wxCond").textContent = wx.curCond + (wx.hi!=null && wx.lo!=null && !isNaN(wx.hi) ? ` · H ${wx.hi}° / L ${wx.lo}°` : "");
    $("#wxLoc").textContent = wx.label || "";
    setWxMeta(wx.feels, wx.rainMax, wx.humidity, wx.wind);
    const sw = $("#wxSparkWrap");
    if(wx.hourly && wx.hourly.length){
      sw.innerHTML = buildSparkline(wx.hourly, "#C8A24B");
      wireSparkline(wx.hourly,
        hr => {   // onHover: re-skin (gradual) + swap the top-left temp/glyph/condition + readouts to this hour
          applyTheme(hr.cond, hr.day, true);
          hero.classList.add("hovering");
          $("#wxGlyph").textContent = wxGlyph(hr.cond);
          $("#wxTemp").textContent = (hr.temp ?? hr.tF) + "°";
          $("#wxCond").textContent = hr.cond || "";
          const b = $("#wxHourBadge"); if(b) b.textContent = fmtHour(hr.t ?? hr.h);
          setWxMeta(hr.feels, hr.precip, hr.humidity, hr.wind);
        },
        () => {   // onLeave: back to current conditions
          applyTheme(wx.curCond, wx.curDay, true);
          hero.classList.remove("hovering");
          $("#wxGlyph").textContent = wxGlyph(wx.curCond);
          $("#wxTemp").textContent = (wx.curTemp==null||wx.curTemp==="—") ? "—" : wx.curTemp + "°";
          $("#wxCond").textContent = wx.curCond + (wx.hi!=null && wx.lo!=null && !isNaN(wx.hi) ? ` · H ${wx.hi}° / L ${wx.lo}°` : "");
          setWxMeta(wx.feels, wx.rainMax, wx.humidity, wx.wind);
        });
    } else sw.innerHTML = `<div style="font-size:12.5px;padding:8px 0;opacity:.7">Hourly detail unavailable.</div>`;
  };
  try{
    const wx = await fetchWeather();
    paint(wx);
  }catch(e){
    // fallback to whatever the task published
    const hourly = (d.hourly || []).map(x => ({...x, day:true, feels:feelsLike(x.temp ?? x.tF, null, null)}));
    const cur = hourly[0] || {};
    paint({
      label: WX_LOC.label,
      curTemp: cur.temp ?? cur.tF ?? "—",
      curCond: (d.weather || "Forecast").split("—")[0].trim() || "Forecast",
      curDay:true, feels:null, humidity:null, wind:null, hi:null, lo:null, rainMax:null,
      hourly
    });
    if(!hourly.length && $("#wxCond")) $("#wxCond").textContent = d.weather || "Forecast unavailable.";
  }
}

/* ================= portfolio ================= */
/* Holdings are NOT embedded here — they live encrypted in data/holdings.json.enc
   and are decrypted at the site gate. */
let HOLDINGS = null;

const P = { pos:[], live:{}, perf:"day", acct:"all", sortKey:"marketValue", sortDir:-1, search:"", filter:null, fetched:false, fetching:false };
const PPAL = ["#C8A24B","#3E4C59","#5C7A6B","#8A9BA8","#A08339","#7B6D8D","#C97B63","#B5A78C","#4A5568","#6B7177","#D9C7A0","#2F4858"];
function pcolor(t){ let x = 0; for(const c of t) x = (x*31 + c.charCodeAt(0)) >>> 0; return PPAL[x % PPAL.length]; }
const usd = (n,dec=2) => "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});
const usdS = n => (n>=0?"+":"−") + "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const pctS = n => (n>=0?"+":"−") + Math.abs(n).toFixed(2) + "%";
const pcls = n => n>=0 ? "pos" : "neg";

async function pQuote(sym){
  const target = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
  const urls = [target, "https://corsproxy.io/?url="+encodeURIComponent(target), "https://api.allorigins.win/raw?url="+encodeURIComponent(target)];
  for(const u of urls){
    try{
      const r = await fetch(u, {cache:"no-store"}); if(!r.ok) continue;
      const j = await r.json(); const m = j?.chart?.result?.[0]?.meta;
      if(m && typeof m.regularMarketPrice === "number")
        return {price:m.regularMarketPrice, prev:(m.chartPreviousClose ?? m.previousClose ?? m.regularMarketPrice)};
    }catch(e){}
  }
  return null;
}

function pCompute(){
  P.pos = HOLDINGS.positions.map(p => {
    const hasCost = p.avgCost != null && p.type !== "cash";
    let price = p.snapshotPrice, prev = p.snapshotPrice, src = "snap";
    if(p.type === "cash"){ price = 1; prev = 1; src = "cash"; }
    else{ const q = P.live[p.fetchSymbol||p.ticker]; if(q){ price = q.price; prev = q.prev; src = "live"; } }
    const marketValue = p.shares * price;
    const costBasis = hasCost ? p.shares * p.avgCost : null;
    const gainDollar = hasCost ? marketValue - costBasis : null;
    const gainPct = hasCost && costBasis > 0 ? gainDollar/costBasis*100 : null;
    const dayDollar = p.type === "cash" ? 0 : p.shares * (price - prev);
    const dayPct = (prev > 0 && p.type !== "cash") ? (price-prev)/prev*100 : 0;
    return {...p, hasCost, price, prev, src, marketValue, costBasis, gainDollar, gainPct, dayDollar, dayPct};
  });
}
const pView = () => P.acct === "all" ? P.pos : P.pos.filter(p => p.account === P.acct);
/* In the All Accounts view, combine every ticker held in more than one account into a single
   row (cash sweeps like SPAXX included) — shares/value/gain roll up, avg cost is recomputed
   from the combined cost basis so the merged row's numbers stay accurate. */
function pViewMerged(){
  const list = pView();
  if(P.acct !== "all") return list;
  const groups = {}, order = [];
  list.forEach(p => {
    if(!groups[p.ticker]){ groups[p.ticker] = []; order.push(p.ticker); }
    groups[p.ticker].push(p);
  });
  return order.map(tk => {
    const g = groups[tk];
    if(g.length === 1) return g[0];
    const shares = g.reduce((s,p)=>s+p.shares,0);
    const marketValue = g.reduce((s,p)=>s+p.marketValue,0);
    const dayDollar = g.reduce((s,p)=>s+p.dayDollar,0);
    const allHaveCost = g.every(p => p.hasCost);
    const costBasis = allHaveCost ? g.reduce((s,p)=>s+p.costBasis,0) : null;
    const gainDollar = allHaveCost ? marketValue - costBasis : null;
    const gainPct = allHaveCost && costBasis > 0 ? gainDollar/costBasis*100 : null;
    const avgCost = allHaveCost && shares > 0 ? costBasis/shares : null;
    const price = shares > 0 ? marketValue/shares : g[0].price;
    const prevValue = marketValue - dayDollar;
    const dayPct = prevValue > 0 ? dayDollar/prevValue*100 : 0;
    return {...g[0], account:"all", shares, marketValue, dayDollar, dayPct,
      hasCost: allHaveCost, costBasis, gainDollar, gainPct, avgCost, price,
      src: g.some(p => p.src === "live") ? "live" : g[0].src};
  });
}
function pTotals(list){
  const t = {value:0, gain:0, cost:0, day:0, anyLive:false};
  list.forEach(p => { t.value += p.marketValue; t.day += p.dayDollar;
    if(p.gainDollar != null){ t.gain += p.gainDollar; t.cost += p.costBasis; }
    if(p.src === "live") t.anyLive = true; });
  t.gainPct = t.cost > 0 ? t.gain/t.cost*100 : 0;
  const prev = t.value - t.day; t.dayPct = prev > 0 ? t.day/prev*100 : 0;
  return t;
}
function pGroups(list){
  const m = {};
  list.forEach(p => { const k = p.ticker;
    if(!m[k]) m[k] = {ticker:k, name:p.name, value:0, gain:0, hasGain:false};
    m[k].value += p.marketValue;
    if(p.gainDollar != null){ m[k].gain += p.gainDollar; m[k].hasGain = true; } });
  return Object.values(m).sort((a,b) => b.value - a.value);
}

/* ---------- portfolio value history ---------- */
async function fetchHistSym(sym){
  const target = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5y`;
  const urls = [target, "https://corsproxy.io/?url="+encodeURIComponent(target), "https://api.allorigins.win/raw?url="+encodeURIComponent(target)];
  for(const u of urls){
    try{
      const r = await fetch(u, {cache:"no-store"}); if(!r.ok) continue;
      const j = await r.json(); const res = j?.chart?.result?.[0];
      if(res?.timestamp && res?.indicators?.quote?.[0]?.close) return {t:res.timestamp, c:res.indicators.quote[0].close};
    }catch(e){}
  }
  return null;
}
async function loadHistory(){
  if(P.histReady || P.histLoading) return;
  P.histLoading = true;
  P.histData = {};
  const syms = [...new Set(HOLDINGS.positions.filter(p => p.type !== "cash").map(p => p.fetchSymbol || p.ticker))];
  await Promise.all(syms.map(async s => { const h = await fetchHistSym(s); if(h) P.histData[s] = h; }));
  P.histLoading = false; P.histReady = true;
  if(S.tab === "portfolio") renderHistory();
}

/* ---------- intraday (today's session, for the Today snapshot chart) ---------- */
async function fetchIntradaySym(sym){
  const target = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=5m&range=1d`;
  const urls = [target, "https://corsproxy.io/?url="+encodeURIComponent(target), "https://api.allorigins.win/raw?url="+encodeURIComponent(target)];
  for(const u of urls){
    try{
      const r = await fetch(u, {cache:"no-store"}); if(!r.ok) continue;
      const j = await r.json(); const res = j?.chart?.result?.[0];
      if(res?.timestamp && res?.indicators?.quote?.[0]?.close){
        const reg = res.meta?.currentTradingPeriod?.regular;
        return {t:res.timestamp, c:res.indicators.quote[0].close, start:reg?.start, end:reg?.end};
      }
    }catch(e){}
  }
  return null;
}
async function loadIntraday(){
  if(P.intraReady || P.intraLoading) return;
  P.intraLoading = true; P.intraday = {}; P.intraMeta = null;
  const syms = [...new Set(HOLDINGS.positions.filter(p => p.type !== "cash").map(p => p.fetchSymbol || p.ticker))];
  await Promise.all(syms.map(async s => { const h = await fetchIntradaySym(s); if(h){ P.intraday[s] = h; if(!P.intraMeta && h.start && h.end) P.intraMeta = {start:h.start, end:h.end}; } }));
  P.intraLoading = false; P.intraReady = true;
}
/* Combine each holding's intraday prices (forward-filled onto a common timestamp spine) into
   the portfolio's total market value at each 5-min mark through the session. */
function intradaySeries(){
  if(!P.intraday) return null;
  const syms = Object.keys(P.intraday); if(!syms.length) return null;
  const spineSym = P.intraday["SPY"] ? "SPY" : syms[0];
  const spine = P.intraday[spineSym].t;
  const meta = P.intraMeta || {start:spine[0], end:spine[spine.length-1]};
  const aligned = {};
  for(const s of syms){
    const {t,c} = P.intraday[s]; const arr = []; let j=0, last=null;
    for(const ts of spine){ while(j<t.length && t[j]<=ts){ if(c[j]!=null) last=c[j]; j++; } arr.push(last); }
    aligned[s] = arr;
  }
  const positions = P.pos, pts = [];
  spine.forEach((ts,i) => {
    let total = 0;
    positions.forEach(p => {
      if(p.type==="cash"){ total += p.shares; return; }
      const sym = p.fetchSymbol||p.ticker;
      let px = aligned[sym] ? aligned[sym][i] : null;
      if(px==null) px = (p.price!=null ? p.price : p.snapshotPrice);
      total += p.shares * px;
    });
    if(!isNaN(total) && total > 0) pts.push({ts, v:total});
  });
  if(pts.length < 2) return null;
  return {pts, start:meta.start, end:meta.end};
}
/* draws the intraday value line on a fixed open→close axis; the line only reaches "now",
   leaving the rest of the session's width empty to fill as the day goes on. */
function buildIntradayChart(ser){
  const {pts, start, end} = ser;
  const W=380, H=62, PT=6, PB=6, PR=5;
  const span = (end - start) || 1;
  const fx = ts => Math.max(0, Math.min(1, (ts - start)/span)) * (W - PR);
  const vals = pts.map(p=>p.v); let mn=Math.min(...vals), mx=Math.max(...vals); if(mn===mx){ mn-=1; mx+=1; }
  const fy = v => PT + (H-PT-PB) - ((v-mn)/(mx-mn))*(H-PT-PB);
  const first = pts[0].v, last = pts[pts.length-1].v, col = last>=first ? "#18996B" : "#DC4B43";
  let line = "", area = `M ${fx(pts[0].ts).toFixed(1)} ${(H-PB).toFixed(1)}`;
  pts.forEach((p,i) => { const X=fx(p.ts).toFixed(1), Y=fy(p.v).toFixed(1); line += `${i?"L":"M"} ${X} ${Y} `; area += ` L ${X} ${Y}`; });
  area += ` L ${fx(pts[pts.length-1].ts).toFixed(1)} ${(H-PB).toFixed(1)} Z`;
  const lx = fx(pts[pts.length-1].ts), ly = fy(last);
  const fmt = ts => new Date(ts*1000).toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit"});
  return `<svg viewBox="0 0 ${W} ${H}" class="ps-spark" preserveAspectRatio="none">
    <defs><linearGradient id="psGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".2"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#psGrad)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${col}"/>
  </svg>
  <div class="ps-axis"><span>Open</span><span>${esc(fmt(start + span/2))}</span><span>Close</span></div>`;
}
function histSeries(){
  const spineSym = P.histData["SPY"] ? "SPY" : Object.keys(P.histData)[0];
  if(!spineSym) return null;
  const dstr = ts => new Date(ts*1000).toLocaleDateString("en-CA");
  const spine = P.histData[spineSym].t.map(dstr);
  const maps = {};
  for(const [sym,h] of Object.entries(P.histData)){
    const m = {}; h.t.forEach((ts,i) => { if(h.c[i] != null) m[dstr(ts)] = h.c[i]; });
    maps[sym] = m;
  }
  const positions = pView(), last = {};
  const pts = spine.map(d => {
    let total = 0;
    positions.forEach(p => {
      if(p.type === "cash"){ total += p.shares; return; }
      const sym = p.fetchSymbol || p.ticker;
      let c = maps[sym] ? maps[sym][d] : undefined;
      if(c == null) c = last[sym];
      if(c == null) c = p.snapshotPrice;
      last[sym] = c;
      total += p.shares * c;
    });
    return {d, v: total};
  });
  // append a live "now" point if today's prices are in and the spine ends earlier
  const today = new Date().toLocaleDateString("en-CA");
  if(P.fetched && pts.length && pts[pts.length-1].d < today) pts.push({d: today, v: pTotals(positions).value});
  return pts;
}
const HIST_RANGES = {"1W":7, "1M":31, "3M":93, "6M":186, "1Y":370, "5Y":1856};
function renderHistory(){
  const body = $("#histBody"); if(!body) return;
  if(!P.histReady){ body.innerHTML = `<div class="spinner" style="margin:46px auto"></div>`; loadHistory(); return; }
  const all = histSeries();
  if(!all || all.length < 2){ body.innerHTML = `<div class="empty">Price history is unavailable right now — try Refresh.</div>`; $("#histHead").textContent = ""; return; }
  const days = HIST_RANGES[P.histRange || "1M"];
  const cutoff = new Date(Date.now() - days*864e5).toLocaleDateString("en-CA");
  let pts = all.filter(p => p.d >= cutoff);
  if(pts.length < 2) pts = all.slice(-2);

  const first = pts[0].v, lastV = pts[pts.length-1].v, delta = lastV - first;
  const dPct = first > 0 ? delta/first*100 : 0;
  $("#histHead").innerHTML = `<span class="hist-delta ${pcls(delta)}">${usdS(delta)} (${pctS(dPct)})</span>&nbsp; ${esc(shortDate(pts[0].d))} → ${esc(shortDate(pts[pts.length-1].d))}`;

  const W = 800, H = 250, PL = 62, PR = 14, PT = 12, PB = 30;
  const vals = pts.map(p => p.v);
  let min = Math.min(...vals), max = Math.max(...vals);
  const pad = (max-min)*0.06 || max*0.005; min -= pad; max += pad;
  const X = i => PL + (W-PL-PR) * (pts.length === 1 ? 0 : i/(pts.length-1));
  const Y = v => PT + (H-PT-PB) * (1 - (v-min)/((max-min)||1));
  const col = delta >= 0 ? "#18996B" : "#DC4B43";
  let line = "", area = `M ${X(0)} ${H-PB}`;
  pts.forEach((p,i) => { line += `${i?"L":"M"} ${X(i).toFixed(1)} ${Y(p.v).toFixed(1)} `; area += ` L ${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`; });
  area += ` L ${X(pts.length-1).toFixed(1)} ${H-PB} Z`;
  const grid = [min+pad, (min+max)/2, max-pad].map(v =>
    `<line x1="${PL}" x2="${W-PR}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" stroke="#E7E7E1" stroke-width="1"/>
     <text x="${PL-8}" y="${(Y(v)+4).toFixed(1)}" text-anchor="end" font-size="11" fill="#6B7177" font-family="Lato">${usd(v,0)}</text>`).join("");
  body.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block" id="histSvg">
    <defs><linearGradient id="histGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".18"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#histGrad)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(pts.length-1).toFixed(1)}" cy="${Y(lastV).toFixed(1)}" r="4" fill="${col}"/>
    <line id="histHair" x1="0" x2="0" y1="${PT}" y2="${H-PB}" stroke="#C8A24B" stroke-width="1" style="display:none"/>
    <circle id="histDot" r="4.5" fill="#C8A24B" style="display:none"/>
    <text x="${PL}" y="${H-8}" font-size="11" fill="#6B7177" font-family="Lato">${esc(shortDate(pts[0].d))}</text>
    <text x="${W-PR}" y="${H-8}" text-anchor="end" font-size="11" fill="#6B7177" font-family="Lato">${esc(shortDate(pts[pts.length-1].d))}</text>
    <rect x="${PL}" y="${PT}" width="${W-PL-PR}" height="${H-PT-PB}" fill="transparent" id="histHit"/>
  </svg><div class="hist-tip" id="histTip"></div>`;
  const svg = $("#histSvg"), tip = $("#histTip"), hair = $("#histHair"), dot = $("#histDot");
  $("#histHit").addEventListener("mousemove", e => {
    const r = svg.getBoundingClientRect();
    const fx = (e.clientX - r.left) / r.width * W;
    const i = Math.max(0, Math.min(pts.length-1, Math.round((fx-PL)/((W-PL-PR)/(pts.length-1)))));
    const px = X(i), py = Y(pts[i].v);
    hair.setAttribute("x1", px); hair.setAttribute("x2", px); hair.style.display = "block";
    dot.setAttribute("cx", px); dot.setAttribute("cy", py); dot.style.display = "block";
    tip.style.display = "block";
    tip.style.left = (px/W*100) + "%";
    tip.style.top = (py/H*r.height) + "px";
    tip.innerHTML = `${esc(shortDate(pts[i].d))} · <span class="tv">${usd(pts[i].v,0)}</span>`;
  });
  $("#histHit").addEventListener("mouseleave", () => { tip.style.display = "none"; hair.style.display = "none"; dot.style.display = "none"; });
}

async function renderHoldingsNews(){
  const el = $("#hnews"); if(!el) return;
  try{
    const latest = (S.manifest?.market || [])[0];
    if(!latest){ el.innerHTML = `<p style="color:var(--muted);font-size:14px;padding:4px 2px">Appears here once the next market brief publishes.</p>`; return; }
    const d = await fetchDay("market", latest);
    const items = d.holdingsNews || [];
    if(!items.length){
      el.innerHTML = `<p style="color:var(--muted);font-size:14px;padding:4px 2px">No notable news on your holdings in the latest brief (${esc(shortDate(latest))}).</p>`;

function drawPBars(t){
  const el = $("#pBars"); if(!el) return;
  const day = P.perf === "day";
  // metric that drives direction and length, sector-chart style
  const metric = p => p.type === "cash" ? 0 : (day ? p.dayPct : (p.hasCost ? p.gainPct : p.dayPct));
  const list = pViewMerged().slice().sort((a,b) => metric(b) - metric(a));   // best to worst
  const posMax = Math.max(0, ...list.map(p => metric(p)));
  const negMax = Math.max(0, ...list.map(p => -metric(p)));
  const range = Math.max(.1, posMax + negMax);
  const negShare = negMax > 0 ? Math.max(8, negMax/range*100) : 5;    // midline position (%)
  const posLane = 100 - negShare, negLane = negShare;
  // Reserve a hard margin (% of the full track) on whichever side a bar's value label sits,
  // so the label can never render past the card edge, no matter how the data shakes out.
  const LABEL_RESERVE = 11;
  el.innerHTML = "";
  list.forEach(p => {
    const m = metric(p);
    const share = t.value > 0 ? p.marketValue/t.value*100 : 0;
    const isCash = p.type === "cash";
    const noCost = !day && !p.hasCost && !isCash;
    const col = isCash ? "#9BA0A6" : noCost ? "var(--gold)" : (m >= 0 ? "var(--up)" : "var(--down)");
    const label = isCash ? "Cash" : pctS(m) + (noCost ? " today" : "");
    const pos = m >= 0;
    const lane = pos ? posLane : negLane;
    const rawW = isCash ? 1.4 : Math.abs(m)/range * 94;
    const w = isCash ? 1.4 : Math.max(1.4, Math.min(rawW, Math.max(1.4, lane - LABEL_RESERVE)));
    const inside = !pos && w >= 12;   // negative labels sit inside the bar in white, like the sector chart
    const barStyle = pos
      ? `background:${col};left:${negShare}%;justify-content:flex-end`
      : `background:${col};right:${100-negShare}%;justify-content:flex-start`;
    const labelStyle = inside
      ? "color:#fff"
      : pos
        ? `color:${isCash ? "var(--muted)" : col};position:absolute;left:calc(100% + 8px);white-space:nowrap`
        : `color:${col};position:absolute;right:calc(100% + 8px);white-space:nowrap`;
    const row = document.createElement("div"); row.className = "hrow";
    row.style.cursor = "pointer";
    row.innerHTML = `<div class="hname"><b>${esc(p.ticker)}</b> <span style="color:var(--muted);font-weight:400;font-size:11px">${share.toFixed(1)}%</span></div>
      <div class="htrack"><div class="hmid" style="left:${negShare}%"></div>
      <div class="hbar" style="${barStyle};width:0;overflow:visible"><span style="${labelStyle}">${esc(label)}</span></div></div>`;
    row.addEventListener("click", () => { P.filter = P.filter === p.ticker ? null : p.ticker; renderPortfolio(); });
    el.appendChild(row);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ row.querySelector(".hbar").style.width = w + "%"; }));
  });
}

const Q = { words:null, round:[], idx:0, score:0, results:[] };
const shuffle = a => { const x = a.slice(); for(let i=x.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [x[i],x[j]] = [x[j],x[i]]; } return x; };

/* spaced repetition: per-word stats live in localStorage */
const qStats = () => JSON.parse(localStorage.getItem("dh-quiz-stats") || "{}");
function qRecord(term, right){
  const all = qStats(); const st = all[term] || {s:0, c:0, k:0};
  st.s++; if(right){ st.c++; st.k++; } else st.k = 0;
  all[term] = st; localStorage.setItem("dh-quiz-stats", JSON.stringify(all));
}
function qWeight(term){
  const st = qStats()[term];
  if(!st) return 3;                              // never seen — prioritize
  const acc = st.c / st.s;
  let w = 0.6 + (1-acc)*4 + (st.k === 0 ? 1.5 : 0) - Math.min(st.k,4)*0.35;
  return Math.max(0.3, w);                       // mastered words still appear, just rarely
}
function weightedPick(pool, n){
  const out = [], p = pool.slice();
  while(out.length < n && p.length){
    const ws = p.map(w => qWeight(w.term));
    let r = Math.random() * ws.reduce((a,b)=>a+b,0);
    let i = 0; while(r > ws[i] && i < p.length-1){ r -= ws[i]; i++; }
    out.push(p.splice(i,1)[0]);
  }
  return out;
}
function masteryHtml(term){
  const st = qStats()[term];
  if(!st) return `<span class="mast new">NEW</span>`;
  const pct = Math.round(st.c/st.s*100);
  const col = pct >= 80 ? "var(--up)" : pct >= 50 ? "var(--gold)" : "var(--down)";
  return `<span class="mast"><span class="mtrack"><span class="mfill" style="width:${pct}%;background:${col};display:block"></span></span>${pct}%</span>`;
}

/* seeded RNG so built-in daily puzzles are the same for the whole day */
function daySeed(salt){
  const d = new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
  let x = 0; for(const c of (d+(salt||""))) x = (x*31 + c.charCodeAt(0)) >>> 0;
  return () => { x = (x*1103515245 + 12345) & 0x7fffffff; return x/0x7fffffff; };
}

/* ---------- built-in: Codebreaker (Mastermind-style deduction) ---------- */
const CB_COLORS = ["#C8A24B","#1D9E75","#D4537E","#378ADD","#BA7517","#7F77DD"];
function renderCodebreaker(){
  const panel = $("#panel-quiz");
  $("#staleNote").style.display = "none";
  const LEN = 4, TRIES = 8, NC = CB_COLORS.length;
  let code = Array.from({length:LEN}, () => Math.floor(Math.random()*NC));
  let guesses = [];                                   // {g:[...], black, white}
  let current = Array.from({length:LEN}, () => null); // active guess
  let over = false, result = null;

  const scoreGuess = g => {
    let black=0, white=0; const cc = code.slice(), gg = g.slice();
    for(let i=0;i<LEN;i++){ if(gg[i]===cc[i]){ black++; cc[i]=-1; gg[i]=-2; } }
    for(let i=0;i<LEN;i++){ if(gg[i]<0) continue; const j=cc.indexOf(gg[i]); if(j>=0){ white++; cc[j]=-1; } }
    return {black, white};
  };
  const pegs = g => g.map(ci => `<span class="cb-peg filled" style="background:${CB_COLORS[ci]}"></span>`).join("");
  const fb = (b,w) => { let d=""; for(let i=0;i<b;i++)d+=`<i class="black"></i>`; for(let i=0;i<w;i++)d+=`<i class="white"></i>`; for(let i=b+w;i<LEN;i++)d+=`<i></i>`; return `<div class="cb-fb">${d}</div>`; };

  const render = () => {
    let rows = guesses.map(x => `<div class="cb-row"><div class="cb-pegs4">${pegs(x.g)}</div>${fb(x.black,x.white)}</div>`).join("");
    let active = "";
    if(!over){
      active = `<div class="cb-row"><div class="cb-pegs4">` +
        current.map((ci,i) => `<span class="cb-peg cb-slot${ci==null?"":" filled"}" data-slot="${i}" style="${ci==null?"":"background:"+CB_COLORS[ci]}"></span>`).join("") +
        `</div><button class="cb-check" id="cbCheck">Check</button></div>`;
    }
    panel.innerHTML = `<div class="cb-wrap">
      <button class="pbtn game-back" id="cbBack">← Back to Games</button>
      <div class="qprompt-label" style="color:#A08339">Codebreaker</div>
      <div class="qprompt" style="font-size:15px;line-height:1.5">Crack the hidden 4-color code. Click a slot to cycle its color, then Check. <b style="color:var(--ink)">Filled dot</b> = right color &amp; spot; <b style="color:var(--ink)">hollow dot</b> = right color, wrong spot.</div>
      <div style="font-size:12px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 4px">${over?"":(TRIES - guesses.length)+" guesses left"}</div>
      <div class="cb-board">${rows}${active}</div>
      <div id="cbMsg"></div>
    </div>`;
    $("#cbBack").addEventListener("click", () => { gamesView="launcher"; renderGamesLauncher(); });
    if(!over){
      panel.querySelectorAll(".cb-slot").forEach(s => s.addEventListener("click", () => {
        const i = +s.dataset.slot; current[i] = current[i]==null ? 0 : (current[i]+1)%NC; render();
      }));
      $("#cbCheck").addEventListener("click", () => {
        if(current.some(c => c==null)){ const m=$("#cbMsg"); if(m) m.innerHTML = `<div style="color:var(--down);font-size:13px;font-weight:700;margin-top:8px">Fill all four slots first.</div>`; return; }
        const s = scoreGuess(current);
        guesses.push({g:current.slice(), black:s.black, white:s.white});
        if(s.black===LEN){ finish(true); return; }
        if(guesses.length>=TRIES){ finish(false); return; }
        current = Array.from({length:LEN}, () => null); render();
      });
    }
    if(over && result) showResult();
  };
  const finish = won => {
    over = true; result = {won, code:code.slice(), tries:guesses.length};
    if(won){ const prev = Number(localStorage.getItem("dh-code-best")||"99"); if(guesses.length < prev) localStorage.setItem("dh-code-best", String(guesses.length)); }
    render();
  };
  const showResult = () => {
    const m = $("#cbMsg"); if(!m) return;
    m.innerHTML = `<div class="qreveal" style="margin-top:8px">
      <b style="color:${result.won?"var(--up)":"var(--down)"};font-size:15px">${result.won?`Cracked it in ${result.tries}!`:"Out of guesses."}</b>
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;align-items:center">Code: ${result.code.map(ci=>`<span class="cb-peg filled" style="background:${CB_COLORS[ci]};width:24px;height:24px"></span>`).join("")}</div>
      </div><button class="qbig qnext" id="cbAgain">Play Again</button>`;
    $("#cbAgain").addEventListener("click", () => { code=Array.from({length:LEN},()=>Math.floor(Math.random()*NC)); guesses=[]; current=Array.from({length:LEN},()=>null); over=false; result=null; render(); });
  };
  render();
}

    return;
  }
  let score=0, streak=0, best=Number(localStorage.getItem("dh-chart-best")||"0");
  const shuffle = a => { const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; };
  const chartSvg = closes => {
    const pts = closes.filter(v=>v!=null).slice(-60);
    const W=520,H=150,PT=12,PB=12; let mn=Math.min(...pts),mx=Math.max(...pts); if(mn===mx){mn-=1;mx+=1;}
    const X=i=>i/(pts.length-1)*W, Y=v=>PT+(H-PT-PB)-((v-mn)/(mx-mn))*(H-PT-PB);
    const up = pts[pts.length-1]>=pts[0], col = up?"#18996B":"#DC4B43";
    let line=""; pts.forEach((v,i)=>line+=`${i?"L":"M"} ${X(i).toFixed(1)} ${Y(v).toFixed(1)} `);
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block"><path d="${line}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  };
  const round = () => {
    const sym = pool[Math.floor(Math.random()*pool.length)];
    const opts = shuffle([sym, ...shuffle(pool.filter(s=>s!==sym)).slice(0,3)]);
    const closes = P.histData[sym].c;
    const v = closes.filter(x=>x!=null).slice(-60);
    const change = v.length>1 ? (v[v.length-1]-v[0])/v[0]*100 : 0;
    panel.innerHTML = `<div class="cm-wrap">
      <button class="pbtn game-back" id="cmBack3">← Back to Games</button>
      <div class="bb-score">Score ${score} · Streak ${streak} · Best ${best}</div>
      <div class="qprompt" style="font-size:16px;margin:6px 0 14px">Which of your holdings is this?</div>
      <div class="cm-chart">${chartSvg(closes)}<div class="cm-cap">Last ${v.length} trading days · ticker hidden</div></div>
      <div class="cm-opts">${opts.map(s=>`<button class="cm-opt" data-s="${esc(s)}">${esc(symMeta[s].ticker)}</button>`).join("")}</div>
      <div id="cmNext"></div>
    </div>`;
    $("#cmBack3").addEventListener("click", () => { gamesView="launcher"; renderGamesLauncher(); });
    panel.querySelectorAll(".cm-opt").forEach(b => b.addEventListener("click", () => {
      const right = b.dataset.s===sym;
      panel.querySelectorAll(".cm-opt").forEach(x => { x.disabled=true; if(x.dataset.s===sym) x.classList.add("correct"); else if(x===b) x.classList.add("wrong"); });
      if(right){ score++; streak++; if(streak>best){ best=streak; localStorage.setItem("dh-chart-best",String(best)); } } else streak=0;
      $("#cmNext").innerHTML = `<div style="font-size:14px;font-weight:900;margin:14px 0 6px;color:${right?"var(--up)":"var(--down)"}">${right?"Correct!":"Nope —"} ${esc(symMeta[sym].ticker)} · ${esc(symMeta[sym].name)} (${pctS(change)} over the window)</div>
        <button class="qbig qnext" id="cmAgain" style="max-width:280px;margin:0 auto">Next Chart</button>`;
      $("#cmAgain").addEventListener("click", round);
    }));
  };
  round();
}

async function renderQuizTab(){
  const panel = $("#panel-quiz");
  panel.innerHTML = `<div class="spinner"></div>`;
  try{
    const words = await fetchWords();
    const newest = words.reduce((a,b) => (a.date||"") > (b.date||"") ? a : b);
    $("#heroEyebrow").textContent = "Word Quiz";
    $("#heroTitle").textContent = "How Sharp Is Your Lexicon?";
    $("#heroSub").textContent = `A multiple-choice quiz built from every Word of the Day in your news briefings — ${words.length} words and counting. Each weekday's new word joins the bank automatically.`;
    $("#heroDateline").textContent = `Newest word: ${newest.term} · added ${niceDate(newest.date)}`;
    quizHome(words);
  }catch(e){
    $("#heroTitle").textContent = "Word Quiz";
    $("#heroSub").textContent = "The word bank hasn't been published yet.";
    $("#heroDateline").textContent = "";
    panel.innerHTML = `<div class="empty">No word bank found. It will appear after the next news briefing publishes.</div>`;
  }
}

function quizHome(words){
  const panel = $("#panel-quiz");
  const best = localStorage.getItem("dh-quiz-best") || "—";
  const plays = localStorage.getItem("dh-quiz-plays") || "0";
  const stats = qStats();
  const mastered = words.filter(w => { const st = stats[w.term]; return st && st.k >= 2 && st.c/st.s >= 0.75; }).length;
  const n = Math.min(10, words.length);
  let h = `<div class="qwrap">
    <button class="pbtn game-back" id="qBackGames">← Back to Games</button>
    <div class="qstats">
      <div class="card"><div class="lbl">Words in Bank</div><div class="big">${words.length}</div></div>
      <div class="card"><div class="lbl">Mastered</div><div class="big">${mastered}<span style="color:var(--muted);font-size:14px">/${words.length}</span></div></div>
      <div class="card"><div class="lbl">Best Score</div><div class="big">${esc(String(best))}</div></div>
      <div class="card"><div class="lbl">Rounds Played</div><div class="big">${esc(plays)}</div></div>
    </div>
    <div class="qcard">
      <div class="qprompt-label">Ready?</div>
      <div class="qprompt">${n} questions, weighted toward words you haven't seen or have missed — today's newest word is always in the mix. Master a word (streak of 2+, 75%+ accuracy) and it shows up less often.</div>
      <button class="qbig qnext" id="qStart">Start Quiz</button>
    </div>
    <div class="kicker">Word Bank</div>
    <button class="pbtn" id="qBankToggle" style="margin-bottom:14px">Show all ${words.length} words</button>
    <div id="qBank" style="display:none"></div>
  </div>`;
  panel.innerHTML = h;
  $("#qBackGames").addEventListener("click", () => { gamesView = "launcher"; renderGamesLauncher(); });
  $("#qStart").addEventListener("click", () => startRound(words));
  $("#qBankToggle").addEventListener("click", () => {
    const b = $("#qBank");
    const open = b.style.display !== "none";
    b.style.display = open ? "none" : "block";
    $("#qBankToggle").textContent = open ? `Show all ${words.length} words` : "Hide word bank";
    if(!open && !b.innerHTML){
      b.innerHTML = words.slice().sort((a,b2) => (b2.date||"").localeCompare(a.date||"")).map(w =>
        `<div class="bank-row"><span><span class="bt">${esc(w.term)}</span> <span class="bp">(${esc(w.pos||"")})</span></span>
         <span class="bd">${esc(w.definition)}</span>${masteryHtml(w.term)}<span class="bdate">${esc(shortDate(w.date))}</span></div>`).join("");
    }
  });
}

function startRound(words){
  const newest = words.reduce((a,b) => (a.date||"") > (b.date||"") ? a : b);
  const n = Math.min(10, words.length);
  const rest = weightedPick(words.filter(w => w !== newest), n-1);   // spaced repetition
  Q.round = shuffle([newest, ...rest]);
  Q.idx = 0; Q.score = 0; Q.results = [];
  renderQuestion(words);
}

function renderQuestion(words){
  const panel = $("#panel-quiz");
  const w = Q.round[Q.idx];
  const mode = Math.random() < 0.5 ? "def2word" : "word2def";
  const pool = shuffle(words.filter(x => x.term !== w.term)).slice(0, Math.min(3, words.length-1));
  const options = shuffle([w, ...pool]);
  const dots = Q.round.map((_,i) =>
    `<span class="qdot ${i < Q.idx ? (Q.results[i] ? "hit" : "miss") : i === Q.idx ? "now" : ""}"></span>`).join("");
  let h = `<div class="qwrap"><div class="qcard">
    <div class="qmeta"><span>Question ${Q.idx+1} / ${Q.round.length}</span><div class="qdots">${dots}</div><span>Score ${Q.score}</span></div>`;
  if(mode === "def2word"){
    h += `<div class="qprompt-label">Which word means…</div>
      <div class="qprompt">“${esc(w.definition)}”</div><div class="qopts">`;
    options.forEach((o,i) => h += `<button class="qopt" data-i="${i}"><b>${esc(o.term)}</b> <span style="color:var(--muted);font-size:12px">${esc(o.respell||"")}</span></button>`);
  }else{
    h += `<div class="qprompt-label">What does this word mean?</div>
      <div class="qprompt">${esc(w.term)} <span class="qipa">${esc(w.ipa||"")} ${esc(w.respell||"")} · ${esc(w.pos||"")}</span></div><div class="qopts">`;
    options.forEach((o,i) => h += `<button class="qopt" data-i="${i}">${esc(o.definition)}</button>`);
  }
  h += `</div><div id="qReveal"></div></div></div>`;
  panel.innerHTML = h;
  panel.querySelectorAll(".qopt").forEach(btn => btn.addEventListener("click", () => {
    const pick = options[Number(btn.dataset.i)];
    const right = pick.term === w.term;
    if(right) Q.score++;
    Q.results.push(right);
    qRecord(w.term, right);
    panel.querySelectorAll(".qopt").forEach(b2 => {
      b2.disabled = true;
      const o = options[Number(b2.dataset.i)];
      if(o.term === w.term) b2.classList.add("correct");
      else if(b2 === btn) b2.classList.add("wrong");
      else b2.classList.add("dim");
    });
    $("#qReveal").innerHTML = `<div class="qreveal">
      <b>${esc(w.term)}</b> ${esc(w.ipa||"")} ${esc(w.respell||"")} (${esc(w.pos||"")}) — ${esc(w.definition)}
      <div class="qex">“${esc(w.example||"")}”</div></div>
      <button class="qbig qnext" id="qNext">${Q.idx+1 < Q.round.length ? "Next Question" : "See Results"}</button>`;
    $("#qNext").addEventListener("click", () => {
      Q.idx++;
      if(Q.idx < Q.round.length) renderQuestion(words);
      else finishRound(words);
    });
    $("#qNext").focus();
  }));
}

function finishRound(words){
  const panel = $("#panel-quiz");
  const pct = Math.round(Q.score/Q.round.length*100);
  const prevBest = localStorage.getItem("dh-quiz-best");
  const bestScore = prevBest ? Math.max(Number(prevBest.split("/")[0]), Q.score) : Q.score;
  const isBest = !prevBest || Q.score >= Number(prevBest.split("/")[0]);
  localStorage.setItem("dh-quiz-best", `${bestScore}/${Q.round.length}`);
  localStorage.setItem("dh-quiz-plays", String(Number(localStorage.getItem("dh-quiz-plays")||"0") + 1));
  const msg = pct === 100 ? "Flawless. Perspicacious, even." :
    pct >= 80 ? "Sharp — your lexicon is in fine form." :
    pct >= 60 ? "Solid. A few more rounds and it's mastered." :
    "The word bank below is your friend. Run it back.";
  const missed = Q.round.filter((_,i) => !Q.results[i]);
  const missedHtml = missed.length ? `<div class="qreveal" style="text-align:left;margin-top:22px">
    <b>Worth another look:</b>${missed.map(w => `<div style="margin-top:8px"><b>${esc(w.term)}</b> — ${esc(w.definition)}</div>`).join("")}
    <div class="qex" style="margin-top:10px">These words will come around more often until you've got them.</div></div>` : "";
  panel.innerHTML = `<div class="qwrap"><div class="qcard qscore-hero">
    <div class="qprompt-label">Round Complete${isBest ? " · New Best" : ""}</div>
    <div class="qs-big">${Q.score}<span style="color:var(--muted);font-size:26px">/${Q.round.length}</span></div>
    <div class="qs-sub">${pct}% correct</div>
    <div class="qs-msg">${esc(msg)}</div>
    ${missedHtml}
    <button class="qbig qnext" id="qAgain">Play Again</button>
    <button class="pbtn qnext" id="qHome" style="width:100%">Back to Quiz Home</button>
  </div></div>`;
  $("#qAgain").addEventListener("click", () => startRound(words));
  $("#qHome").addEventListener("click", () => quizHome(words));
}

/* ================= site gate ================= */
async function tryUnlock(pass){
  if(!S.holdEnc){
    const r = await fetch("data/holdings.json.enc?t="+Date.now());
    if(!r.ok) throw new Error("no verifier");
    S.holdEnc = await r.json();
  }
  const h = await decryptEntry(S.holdEnc, pass);   // throws on wrong passphrase
  HOLDINGS = h; PASS = pass;
}

async function gateInit(){
  const saved = sessionStorage.getItem("dh-pass") || localStorage.getItem("dh-pass");
  if(saved){
    try{ await tryUnlock(saved); $("#gate").style.display = "none"; boot(); return; }
    catch(e){ sessionStorage.removeItem("dh-pass"); localStorage.removeItem("dh-pass"); }
  }
  const go = async () => {
    const v = $("#gatePass").value; if(!v) return;
    $("#gateErr").style.display = "none";
    try{
      await tryUnlock(v);
      sessionStorage.setItem("dh-pass", v);
      if($("#gateRemember").checked) localStorage.setItem("dh-pass", v);
      $("#gate").style.display = "none";
      boot();
    }catch(e){ $("#gateErr").style.display = "block"; }
  };
  $("#gateGo").addEventListener("click", go);
  $("#gatePass").addEventListener("keydown", e => { if(e.key === "Enter") go(); });
  $("#gatePass").focus();
}
$("#siteLock").addEventListener("click", () => {
  sessionStorage.removeItem("dh-pass"); localStorage.removeItem("dh-pass");
  location.reload();
});

gateInit();
</script>
